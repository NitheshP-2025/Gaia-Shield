<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gaia Shield — Environmental Crime Early Warning</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --canopy-950:#0b1710;
    --canopy-900:#102319;
    --canopy-800:#173322;
    --canopy-700:#20452e;
    --moss-500:#4c8b5a;
    --moss-300:#8fc99b;
    --bark-100:#eef1e7;
    --alert-amber:#e0a83e;
    --alert-red:#d64545;
    --alert-crit:#8f1f2b;
    --ink-muted:#9fb3a5;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: var(--canopy-950);
    color: var(--bark-100);
    font-family: var(--font-body);
    min-height:100vh;
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--canopy-700);
    background: linear-gradient(180deg, var(--canopy-900), var(--canopy-950));
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:34px; height:34px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--moss-300), var(--moss-500) 60%, var(--canopy-700));
    box-shadow: 0 0 18px rgba(140,201,155,0.35);
  }
  .brand h1{ font-family: var(--font-display); font-weight:600; font-size:20px; letter-spacing:0.2px;}
  .brand span{ display:block; font-size:11px; color:var(--ink-muted); letter-spacing:1.5px; text-transform:uppercase; margin-top:2px;}

  .status-pill{
    font-family: var(--font-mono); font-size:12px; color: var(--moss-300);
    border:1px solid var(--canopy-700); padding:6px 12px; border-radius:20px;
    display:flex; align-items:center; gap:8px;
  }
  .status-dot{ width:7px; height:7px; border-radius:50%; background: var(--moss-300); box-shadow:0 0 8px var(--moss-300); animation: pulse 2s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.3} }

  .layout{
    display:grid; grid-template-columns: 1fr 400px;
    height: calc(100vh - 71px);
  }
  #map{ height:100%; width:100%; background:var(--canopy-950); }
  .leaflet-container{ background: var(--canopy-950) !important; }

  aside{
    background: var(--canopy-900);
    border-left: 1px solid var(--canopy-700);
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .controls{
    padding: 18px 20px; border-bottom:1px solid var(--canopy-700);
  }
  .controls .day{ font-family: var(--font-mono); font-size:12px; color:var(--ink-muted); margin-bottom:10px;}
  .controls .day b{ color: var(--moss-300); }
  button.simulate{
    width:100%; padding:12px 16px; border-radius:8px; border:none;
    background: linear-gradient(135deg, var(--moss-500), #3a6f47);
    color: var(--bark-100); font-weight:600; font-size:14px; cursor:pointer;
    letter-spacing:0.3px; transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  button.simulate:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(76,139,90,0.35);}
  button.simulate:active{ transform: translateY(0); }
  button.simulate:disabled{ opacity:0.5; cursor:wait; }

  .reset-link{
    display:block; text-align:center; margin-top:10px; font-size:12px;
    color:var(--ink-muted); cursor:pointer; text-decoration:underline; text-underline-offset:3px;
  }

  .legend{
    display:flex; gap:14px; padding: 12px 20px; font-size:11px; color:var(--ink-muted);
    border-bottom:1px solid var(--canopy-700); font-family: var(--font-mono);
  }
  .legend i{ width:9px; height:9px; border-radius:2px; display:inline-block; margin-right:5px; }

  .alerts-header{
    padding: 16px 20px 8px; display:flex; align-items:baseline; justify-content:space-between;
  }
  .alerts-header h2{ font-family: var(--font-display); font-size:16px; font-weight:600; }
  .alerts-header .count{ font-family:var(--font-mono); font-size:12px; color:var(--alert-amber); }

  .alerts-list{ flex:1; overflow-y:auto; padding: 4px 14px 20px; }
  .empty-state{ padding: 40px 20px; text-align:center; color:var(--ink-muted); font-size:13px; }

  .alert-card{
    background: var(--canopy-800);
    border: 1px solid var(--canopy-700);
    border-left: 3px solid var(--alert-amber);
    border-radius: 8px;
    padding: 14px 16px; margin: 8px 6px;
    animation: slideIn 0.35s ease;
  }
  .alert-card.critical{ border-left-color: var(--alert-crit); }
  .alert-card.high{ border-left-color: var(--alert-red); }
  @keyframes slideIn{ from{ opacity:0; transform: translateX(12px);} to{opacity:1; transform:translateX(0);} }

  .alert-card .headline{ font-size:13px; font-weight:600; margin-bottom:4px; }
  .alert-card .meta{ font-family: var(--font-mono); font-size:10.5px; color:var(--ink-muted); margin-bottom:8px; display:flex; gap:10px; flex-wrap:wrap;}
  .alert-card .explanation{ font-size:12.5px; line-height:1.5; color:#d7ddd3; margin-bottom:10px; }
  .alert-card .evidence{ list-style:none; }
  .alert-card .evidence li{ font-size:11.5px; color:var(--ink-muted); padding: 3px 0; padding-left:14px; position:relative; }
  .alert-card .evidence li::before{ content:'✓'; position:absolute; left:0; color:var(--moss-300); font-size:10px; }
  .alert-card .actions{ display:flex; gap:8px; margin-top:10px; }
  .alert-card .actions button{
    flex:1; font-size:11px; padding:6px 8px; border-radius:6px; border:1px solid var(--canopy-700);
    background:transparent; color:var(--bark-100); cursor:pointer;
  }
  .alert-card .actions button:hover{ background: var(--canopy-700); }
  .alert-card.resolved{ opacity:0.45; }

  .zone-tooltip{ font-family: var(--font-mono); font-size:11px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <div>
      <h1>Gaia Shield</h1>
      <span>Predictive Environmental Crime Watch</span>
    </div>
  </div>
  <div class="status-pill"><span class="status-dot"></span> LIVE — Nilgiri Biosphere Reserve, Western Ghats</div>
</header>

<div class="layout">
  <div id="map"></div>

  <aside>
    <div class="controls">
      <div class="day">Simulated day: <b id="dayLabel">0</b> &nbsp;•&nbsp; <span id="zoneCount">144</span> zones monitored</div>
      <button class="simulate" id="simulateBtn">Run next satellite pass</button>
      <span class="reset-link" id="resetLink">Reset simulation</span>
    </div>
    <div class="legend">
      <span><i style="background:#4c8b5a"></i>Low</span>
      <span><i style="background:#e0a83e"></i>Medium</span>
      <span><i style="background:#d64545"></i>High</span>
      <span><i style="background:#8f1f2b"></i>Critical</span>
    </div>
    <div class="alerts-header">
      <h2>Alerts</h2>
      <span class="count" id="alertCount">0 open</span>
    </div>
    <div class="alerts-list" id="alertsList">
      <div class="empty-state">No threats detected yet.<br/>Run a satellite pass to scan the reserve.</div>
    </div>
  </aside>
</div>

<script>
const API_BASE = window.GAIA_API_BASE || "http://localhost:8000";

const map = L.map('map', { zoomControl: true }).setView([11.425, 76.70], 11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const riskColors = { low: '#4c8b5a', medium: '#e0a83e', high: '#d64545', critical: '#8f1f2b' };
let zoneLayer = L.layerGroup().addTo(map);
let alertMarkers = L.layerGroup().addTo(map);

async function fetchJSON(path, opts) {
  const res = await fetch(API_BASE + path, opts);
  if (!res.ok) throw new Error('Request failed: ' + path);
  return res.json();
}

function renderZones(zones) {
  zoneLayer.clearLayers();
  zones.forEach(z => {
    const color = riskColors[z.risk_band];
    const radius = z.risk_band === 'low' ? 90 : 90 + (z.risk_score * 3);
    const circle = L.circle([z.lat, z.lon], {
      radius, color, weight: z.risk_band === 'low' ? 0.5 : 1.5,
      fillColor: color, fillOpacity: z.risk_band === 'low' ? 0.06 : 0.22,
      opacity: z.risk_band === 'low' ? 0.15 : 0.6,
    });
    circle.bindTooltip(
      `<div class="zone-tooltip"><b>${z.id}</b><br/>Risk: ${z.risk_score}/100 (${z.risk_band})<br/>NDVI drop: ${(z.ndvi_drop*100).toFixed(1)}%</div>`,
      { sticky: true }
    );
    circle.addTo(zoneLayer);
  });
}

function renderAlerts(alerts) {
  const list = document.getElementById('alertsList');
  const openAlerts = alerts.filter(a => a.status !== 'resolved');
  document.getElementById('alertCount').textContent = openAlerts.length + ' open';

  alertMarkers.clearLayers();

  if (alerts.length === 0) {
    list.innerHTML = '<div class="empty-state">No threats detected yet.<br/>Run a satellite pass to scan the reserve.</div>';
    return;
  }

  const sorted = [...alerts].sort((a,b) => b.confidence - a.confidence);
  list.innerHTML = sorted.map(a => {
    const band = a.confidence >= 90 ? 'critical' : (a.confidence >= 75 ? 'high' : '');
    const evidenceHtml = a.evidence.map(e => `<li><b>${e.label}:</b> ${e.detail}</li>`).join('');
    const resolvedClass = a.status === 'resolved' ? 'resolved' : '';
    return `
      <div class="alert-card ${band} ${resolvedClass}" data-id="${a.id}">
        <div class="headline">${a.headline}</div>
        <div class="meta">
          <span>📍 ${a.lat.toFixed(3)}, ${a.lon.toFixed(3)}</span>
          <span>⏱ ${a.predicted_window_days}d window</span>
          <span>${a.status.toUpperCase()}</span>
        </div>
        <div class="explanation">${a.explanation}</div>
        <ul class="evidence">${evidenceHtml}</ul>
        <div class="actions">
          ${a.status === 'open' ? `<button onclick="ackAlert('${a.id}')">Acknowledge</button>` : ''}
          ${a.status !== 'resolved' ? `<button onclick="resolveAlertCall('${a.id}')">Mark resolved</button>` : ''}
        </div>
      </div>`;
  }).join('');

  alerts.filter(a => a.status !== 'resolved').forEach(a => {
    const marker = L.circleMarker([a.lat, a.lon], {
      radius: 8, color: '#fff', weight: 2, fillColor: '#e0a83e', fillOpacity: 0.9
    });
    marker.bindPopup(`<b>${a.headline}</b><br/>${a.explanation}`);
    marker.addTo(alertMarkers);
  });
}

async function refreshAll() {
  const [zones, alerts, health] = await Promise.all([
    fetchJSON('/api/zones'),
    fetchJSON('/api/alerts'),
    fetchJSON('/api/health'),
  ]);
  renderZones(zones);
  renderAlerts(alerts);
  document.getElementById('dayLabel').textContent = health.day;
  document.getElementById('zoneCount').textContent = health.zones_monitored;
}

async function ackAlert(id) {
  await fetchJSON(`/api/alerts/${id}/acknowledge`, { method: 'POST' });
  refreshAll();
}
async function resolveAlertCall(id) {
  await fetchJSON(`/api/alerts/${id}/resolve`, { method: 'POST' });
  refreshAll();
}

document.getElementById('simulateBtn').addEventListener('click', async (e) => {
  const btn = e.target;
  btn.disabled = true; btn.textContent = 'Scanning...';
  try {
    await fetchJSON('/api/simulate', { method: 'POST' });
    await refreshAll();
  } catch (err) {
    alert('Could not reach Gaia Shield API at ' + API_BASE + '. Is the backend running?');
  }
  btn.disabled = false; btn.textContent = 'Run next satellite pass';
});

document.getElementById('resetLink').addEventListener('click', async () => {
  await fetchJSON('/api/reset', { method: 'POST' });
  refreshAll();
});

refreshAll().catch(() => {
  document.getElementById('alertsList').innerHTML =
    `<div class="empty-state">Can't reach the API at ${API_BASE}.<br/>Start the backend: <code>uvicorn main:app --reload</code></div>`;
});
</script>
</body>
</html>
